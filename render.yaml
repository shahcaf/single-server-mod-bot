services:
  - type: web
    name: single-server-mod-bot
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: GUILD_ID
        sync: false
      - key: PORT
        value: "3000"
      - key: NODE_VERSION
        value: "20.x"
      - key: DEV_ID
        sync: false
      - key: UPDATE_WEBHOOK
        sync: false
